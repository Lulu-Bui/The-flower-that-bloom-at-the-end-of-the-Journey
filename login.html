<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Colt Damian</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
.login-container {
  max-width: 400px;
  margin: 0 auto;
  padding: 3rem 2rem;
  text-align: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-top: 2rem;
}
.login-input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
}
.login-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.login-btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 500;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.login-btn:hover {
  opacity: 0.85;
}
.error-msg {
  color: var(--error);
  font-size: 0.85rem;
  margin-top: 10px;
  min-height: 30px;
}
h2 {
  font-family: 'Lora', serif;
  margin-bottom: 0.5rem;
}
</style>
</head>
<body class="reader-body">

<div class="login-container">
  <div class="card" style="padding: 1rem;">
    <p class="story-label">Author Access</p>
    <h2>Login to Dashboard</h2>
    <div class="login-box">
      <input type="password" id="password" class="login-input" placeholder="Enter password" autofocus />
      <button onclick="login()" class="login-btn">Login</button>
      <div id="errorMsg" class="error-msg"></div>
    </div>
    <p style="font-size: 0.75rem; color: var(--faint); margin-top: 1.5rem;">
      Protected area for story management
    </p>
  </div>
</div>

<script>
function login() {
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");
  
  // IMPORTANT: This is client-side authentication.
  // Only use for personal/admin access, not for sensitive user data.
  if (password === "coltdamian123") {
    // Store login state
    sessionStorage.setItem("adminLoggedIn", "true");
    // Redirect to admin dashboard
    window.location.href = "dashboard.html";
  } else {
    errorMsg.textContent = "Incorrect password. Please try again.";
    document.getElementById("password").value = "";
    document.getElementById("password").focus();
  }
}

// Enter key support
document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>
</body>
</html>
